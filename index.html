<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodWait | Queue Time Estimator</title>
    <meta name="description" content="Find nearby food stores and calculate wait time using Markov Chain queueing theory.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header style="margin-bottom: 3.5rem;">
            <h1>FoodWait</h1>
            <div class="status-badge">
                <div class="dot"></div>
                <span class="subtitle">Mission Control · M/E<sub>k</sub>/c Engine</span>
            </div>
        </header>

        <section class="hero-action">
            <button id="findShopsBtn" class="btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                Find Food Near Me
            </button>
            <div class="divider-label">CONFIGURE YOUR SEARCH</div>
            <div class="search-stack">
                <label for="foodInput" class="visually-hidden">Food type</label>
                <input type="text" id="foodInput" name="food" autocomplete="off" class="text-input" placeholder="What food? (e.g. Kebab, Sushi)" value="Kebab">
                <div class="search-row">
                    <label for="cityInput" class="visually-hidden">City name</label>
                    <input type="text" id="cityInput" name="city" autocomplete="address-level2" class="text-input" placeholder="City (or leave empty for GPS)">
                    <button id="searchCityBtn" class="btn btn-sm">Search</button>
                </div>
            </div>
        </section>

        <div id="status" class="status-text" aria-live="polite" style="display:none;"></div>

        <!-- Map — wrapped in organic frame -->
        <div class="organic-frame" style="margin-bottom: 2rem;">
            <div id="map" class="map-container" style="display:none; border:none; margin-bottom:0;"></div>
        </div>

        <!-- List results -->
        <section id="results" class="results-section" aria-live="polite" aria-label="Nearby food places"></section>
    </div>

    <!-- Planetono-style Cockpit Modal -->
    <div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="modalShopName" style="background: var(--bg);">
        <div class="modal" style="max-width: 800px; background: transparent; border: none; padding: 0;">
            
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
                <div>
                    <div class="status-badge" style="margin-bottom: 0.5rem; background: var(--primary); color: var(--white); box-shadow: none;">
                        <div class="dot" style="background: white;"></div>
                        <span>TARGET ACQUIRED</span>
                    </div>
                    <h2 id="modalShopName" style="font-size: 3rem; font-family: var(--head); text-transform: uppercase;">Shop Name</h2>
                </div>
                <button id="closeModal" class="btn" style="padding: 0.6rem 1rem; font-size: 0.8rem;">Abort Mission</button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem;">
                <!-- Left: Controls -->
                <div class="sliders organic-frame" style="background: var(--surface); padding: 2rem; box-shadow: var(--shadow);">
                    <div class="slider-group">
                        <div class="slider-header">
                            <span>PREP FREQUENCY</span>
                            <span id="prepValue" class="slider-val">5 <em>min</em></span>
                        </div>
                        <input type="range" id="prepRange" min="1" max="30" value="5" aria-label="Prep frequency in minutes">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <span>QUEUE LENGTH</span>
                            <span id="queueValue" class="slider-val">4</span>
                        </div>
                        <input type="range" id="queueRange" min="0" max="20" value="4" aria-label="Queue length">
                        <div class="queue-visual" id="queueVisual"></div>
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <span>STAFF CAPACITY</span>
                            <span id="staffValue" class="slider-val">2</span>
                        </div>
                        <input type="range" id="staffRange" min="1" max="8" value="2" aria-label="Staff capacity">
                    </div>
                    <div class="slider-group">
                        <div class="slider-header">
                            <span>ARRIVAL VELOCITY</span>
                            <span id="arrivalValue" class="slider-val">3 <em>/min</em></span>
                        </div>
                        <input type="range" id="arrivalRange" min="1" max="10" value="3" aria-label="Arrival velocity per minute">
                    </div>
                </div>

                <!-- Right: Analytics -->
                <div class="result-card organic-frame" style="background: var(--black); color: var(--white); padding: 2.5rem; display: flex; flex-direction: column; justify-content: center; box-shadow: 4px 4px 0 var(--primary);">
                    <div class="result-top">
                        <div class="result-eyebrow" style="color: var(--secondary); font-family: var(--head); letter-spacing: 2px;">PROBABLE WAIT TIME</div>
                        <div class="result-main">
                            <span id="waitTime" style="color: var(--white); text-shadow: 4px 4px 0 var(--primary); font-size: 5.5rem;">--</span>
                            <span class="result-unit" style="color: var(--secondary); font-family: var(--head);">MIN</span>
                        </div>
                        <div id="smartStatus" class="smart-status" style="color: var(--white); border: 2px solid var(--white); padding: 4px 12px; border-radius: 99px; display: inline-flex; margin-top: 1.2rem; font-family: var(--head); font-size: 1rem;"></div>
                    </div>

                    <div class="confidence-band" style="margin-top: 2rem;">
                        <div class="cb-bound">
                            <span id="waitP10" style="color: var(--secondary);">--</span>
                            <span class="cb-label" style="color: #666;">P-10</span>
                        </div>
                        <div class="cb-track" style="background: #222;"><div class="cb-fill" id="cbFill"></div></div>
                        <div class="cb-bound right">
                            <span id="waitP90" style="color: var(--primary);">--</span>
                            <span class="cb-label" style="color: #666;">P-90</span>
                        </div>
                    </div>

                    <div id="loadNote" class="load-note" style="margin-top: 1.5rem; color: #888; font-family: var(--head); letter-spacing: 1px;"></div>
                </div>
            </div>

            <div id="modelLabel" class="model-label" style="margin-top: 2rem; color: #777; text-align: right; font-family: var(--head); letter-spacing: 1px;">M/E_k/c SIMULATION ACTIVE</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
